<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Celulares - Home</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Header/Navbar -->
    <header class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <h1>📱 Celulares</h1>
            </div>

            <nav class="nav-menu">
                <a href="index.html">Home</a>
                <a href="#produtos">Produtos</a>
                <a href="login.html">Login</a>
            </nav>

            <div class="nav-actions">
                <a href="carrinho.html" class="btn-carrinho">
                    🛒 Carrinho (<span id="cart-count">0</span>)
                </a>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h2>Os Melhores Celulares em Um Só Lugar</h2>
            <p>Encontre marcas renomadas com os melhores preços</p>
            <a href="#produtos" class="btn-primary">Ver Catálogo</a>
        </div>
    </section>

    <!-- Filtros e Busca -->
    <section id="filtros" class="filtros">
        <div class="filtros-container">
            <div class="search-box">
                <input
                    type="text"
                    id="search"
                    placeholder="Buscar por nome ou marca..."
                >
            </div>

            <div class="filtros-group">
                <select id="marca" class="filtro-select">
                    <option value="">Todas as Marcas</option>
                    <option value="Apple">Apple</option>
                    <option value="Samsung">Samsung</option>
                    <option value="Xiaomi">Xiaomi</option>
                </select>

                <select id="ordenar" class="filtro-select">
                    <option value="">Ordenar por</option>
                    <option value="preco_asc">Menor Preço</option>
                    <option value="preco_desc">Maior Preço</option>
                    <option value="popular">Mais Popular</option>
                </select>
            </div>
        </div>
    </section>

    <!-- Catálogo de Produtos -->
    <section id="produtos" class="catalogo">
        <h2>Catálogo de Produtos</h2>
        <div id="produtos-grid" class="produtos-grid">
            <!-- Produtos carregados via JavaScript -->
            <div class="loading">Carregando produtos...</div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 E-commerce Celulares. Todos os direitos reservados.</p>
            <p>Contato: rodrigocamargo0801@gmail.com</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/produtos.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
